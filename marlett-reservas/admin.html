<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Reservas Marlett</title>
  <meta name="theme-color" content="#0f1512" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container {
      max-width: 900px;
      margin: 120px auto 60px;
      padding: 40px;
    }
    .admin-card {
      background: linear-gradient(180deg, rgba(18,24,20,0.94) 0%, rgba(14,19,15,0.92) 100%);
      border: 1px solid rgba(214,200,155,0.08);
      border-radius: 22px;
      box-shadow: 0 28px 55px rgba(0,0,0,.38);
      padding: 40px;
    }
    .admin-title {
      font-family: "Playfair Display", serif;
      font-size: 2.5rem;
      color: #eadfbf;
      margin: 0 0 12px;
      text-align: center;
    }
    .admin-subtitle {
      color: rgba(234,223,191,0.7);
      text-align: center;
      margin: 0 0 32px;
      font-size: 1rem;
    }
    .export-btn {
      width: 100%;
      padding: 18px 32px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(217,200,143,0.18) 0%, rgba(217,200,143,0.12) 100%);
      border: 1px solid rgba(217,200,143,0.4);
      color: #f0e8ce;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: "Manrope", sans-serif;
    }
    .export-btn:hover {
      background: linear-gradient(180deg, rgba(217,200,143,0.25) 0%, rgba(217,200,143,0.18) 100%);
      border-color: rgba(217,200,143,0.6);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(217,200,143,0.15);
    }
    .export-btn:active {
      transform: translateY(0);
    }
    .export-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: rgba(234,223,191,0.8);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }
    .back-link:hover {
      color: #eadfbf;
      text-decoration: underline;
    }
  </style>
</head>
<body class="theme-altos">
  <div class="admin-container">
    <div class="admin-card">
      <h1 class="admin-title">Administración de Reservas</h1>
      <p class="admin-subtitle">Exporta todas las reservas a Excel (CSV)</p>
      
      <button id="exportBtn" class="export-btn">
        <span>📥</span>
        <span>Descargar reservas en Excel</span>
      </button>
      
      <div style="text-align: center;">
        <a href="index.html" class="back-link">← Volver al sitio</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabaseUrl = 'https://lbcaivpxzkcenfyxwydw.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxiY2FpdnB4emtjZW5meXh3eWR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgyMzYzOTgsImV4cCI6MjA3MzgxMjM5OH0.VmoBrs7k1XCvIQ34MycVf9hWUW8DpbPALxAjkIhcupo';

    const supabase = createClient(supabaseUrl, supabaseAnonKey);
    const exportBtn = document.getElementById('exportBtn');

    async function exportarReservasCSV() {
      exportBtn.disabled = true;
      exportBtn.innerHTML = '<span>⏳</span><span>Exportando...</span>';

      try {
        const { data, error } = await supabase
          .from('reservas_marlett')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          alert('No hay reservas para exportar.');
          exportBtn.disabled = false;
          exportBtn.innerHTML = '<span>📥</span><span>Descargar reservas en Excel</span>';
          return;
        }

        // Función para escapar valores CSV
        const escapeCSV = (value) => {
          if (value === null || value === undefined) return '';
          const str = String(value);
          if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            return `"${str.replace(/"/g, '""')}"`;
          }
          return str;
        };

        // Encabezados
        const headers = [
          'id',
          'created_at',
          'nombre_completo',
          'telefono_whatsapp',
          'correo',
          'area_preferida',
          'tipo_evento',
          'fecha_evento',
          'hora_inicio',
          'cantidad_invitados',
          'usa_visuales',
          'paquetes_foto_video',
          'notas_adicionales'
        ];

        // Crear filas CSV
        const rows = data.map(row => 
          headers.map(header => escapeCSV(row[header])).join(',')
        );

        // Combinar encabezados y filas
        const csvContent = [headers.join(','), ...rows].join('\n');

        // Crear blob y descargar (BOM para Excel UTF-8)
        const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        
        // Nombre del archivo con fecha
        const fecha = new Date().toISOString().slice(0,19).replace(/:/g, '-');
        link.setAttribute('download', `reservas_marlett-${fecha}.csv`);
        
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        exportBtn.innerHTML = '<span>✅</span><span>¡Exportado correctamente!</span>';
        setTimeout(() => {
          exportBtn.disabled = false;
          exportBtn.innerHTML = '<span>📥</span><span>Descargar reservas en Excel</span>';
        }, 2000);
      } catch (error) {
        console.error('Error al exportar:', error);
        alert('❌ Hubo un error al exportar las reservas: ' + (error.message || 'Error desconocido'));
        exportBtn.disabled = false;
        exportBtn.innerHTML = '<span>📥</span><span>Descargar reservas en Excel</span>';
      }
    }

    exportBtn.addEventListener('click', exportarReservasCSV);
  </script>
</body>
</html>
